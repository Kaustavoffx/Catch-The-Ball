<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch The Ball</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Catch The Ball</h1>
    
    <p id="instructions">
        Move the basket using mouse or arrow keys to catch the falling ball.
    </p>

    <button id="pauseBtn">Pause</button>
    <button id="startBtn">Start Game</button>

    <div id="startScreen">
        <h2>Welcome To Catch The Ball</h2>
        <p>Press Start to Play</p>
    </div>

    <div id="timerBoard">
        Time: <span id ="timer">0</span>s 
    </div>

    <div id="gameArea">
        <div id="basket"></div>
        <div id="ball"></div>
    </div>
    
    <div id="highScoreBoard">
        High Score: <span id="highScore">0</span>
    </div>

    <div id="scoreBoard">
        Score: <span id="score">0</span>
    </div>

    <div id="livesBoard">
        Lives: <span id="lives">3</span>
    </div>

    <div id = "gameOverModal">
        <div id = "modalContent">
            <h2>Game Over</h2>
            <p id = "finalScoreText"></p>
            <button id="restartBtn">Restart</button>
        </div>
    </div>


    <script src="script.js"></script>

</body>

<footer>
    Built by Kaustav Chowdhury
</footer>

</html>
